<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020617; /* Darker Slate 950 */
            --bg-card: rgba(15, 23, 42, 0.8); /* Darker, more opaque */
            --accent: #818cf8; /* Lighter Indigo 400 for better pop */
            --text-main: #f1f5f9; /* Slate 100 */
            --text-muted: #cbd5e1; /* Slate 300 - much higher contrast */
            --border: rgba(255, 255, 255, 0.15);
        }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.01em;
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, var(--bg-deep) 100%);
            min-height: 100vh;
        }

        .navbar { 
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            color: var(--text-main) !important;
            letter-spacing: -0.04em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-logo {
            width: 24px;
            height: 24px;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            border-radius: 6px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .main-container { max-width: 1000px; margin: 60px auto; padding: 0 20px; }
        
        h1, h2, h3 { font-weight: 700; letter-spacing: -0.03em; color: #fff; }
        .text-gradient {
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        code, pre { font-family: 'JetBrains Mono', monospace; font-size: 0.9em; }

        .text-muted { color: var(--text-muted) !important; }
    </style>
</head>
<body>
    <nav class="navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <div class="brand-logo"></div>
                QUANT_ENGINE
            </a>
        </div>
    </nav>

    <div class="main-container">
        {{ block "main" . }}{{ end }}
    </div>

    <footer class="text-center py-5 text-muted small" style="opacity: 0.5;">
        &copy; {{ now.Format "2006" }} QUANT_PORTFOLIO &bull; POWERED BY C++ WASM
    </footer>
</body>
</html>
