<div class="mc-widget">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="h5 m-0" style="color: var(--text-main); font-family: 'JetBrains Mono', monospace;">GBM_DIFFUSION_MATRIX</h3>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 0.85em; background: rgba(0,0,0,0.2); padding: 4px 12px; border-radius: 6px; color: var(--accent);">
            σ: <span id="volValue">20%</span>
        </div>
    </div>
    
    <div style="margin-bottom: 30px;">
        <input type="range" id="volSlider" min="5" max="80" value="20" step="1" class="custom-slider">
    </div>

    <div style="position: relative; height: 400px; width: 100%;">
        <canvas id="mcChart"></canvas>
    </div>

    <!-- Greeks Display -->
    <div class="row g-2 mt-4" id="greeks-container">
        <div class="col">
            <div class="p-2 rounded-3" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <div class="small mb-1" style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8;">Δ DELTA</div>
                <div class="h6 m-0 text-white fw-bold" id="delta-value" style="font-family: 'JetBrains Mono', monospace;">0.0000</div>
            </div>
        </div>
        <div class="col">
            <div class="p-2 rounded-3" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <div class="small mb-1" style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8;">Γ GAMMA</div>
                <div class="h6 m-0 text-white fw-bold" id="gamma-value" style="font-family: 'JetBrains Mono', monospace;">0.0000</div>
            </div>
        </div>
        <div class="col">
            <div class="p-2 rounded-3" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <div class="small mb-1" style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8;">ν VEGA</div>
                <div class="h6 m-0 text-white fw-bold" id="vega-value" style="font-family: 'JetBrains Mono', monospace;">0.0000</div>
            </div>
        </div>
        <div class="col">
            <div class="p-2 rounded-3" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <div class="small mb-1" style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8;">Θ THETA</div>
                <div class="h6 m-0 text-white fw-bold" id="theta-value" style="font-family: 'JetBrains Mono', monospace;">0.0000</div>
            </div>
        </div>
        <div class="col">
            <div class="p-2 rounded-3" style="background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); text-align: center;">
                <div class="small mb-1" style="font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: #94a3b8;">ρ RHO</div>
                <div class="h6 m-0 text-white fw-bold" id="rho-value" style="font-family: 'JetBrains Mono', monospace;">0.0000</div>
            </div>
        </div>
    </div>
</div>

<style>
    .custom-slider {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        outline: none;
    }

    .custom-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 18px;
        height: 18px;
        background: var(--accent);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        transition: all 0.2s ease-in-out;
    }

    .custom-slider::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.8);
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/js/mc_engine.js"></script>

<script>
    let mcModule;
    let chart;

    const ctx = document.getElementById('mcChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array.from({length: 253}, (_, i) => i), datasets: [] },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            elements: { point: { radius: 0 }, line: { tension: 0.1 } },
            scales: {
                y: { 
                    grid: { color: 'rgba(255,255,255,0.08)' },
                    ticks: { color: '#cbd5e1', font: { family: 'JetBrains Mono', size: 10 } },
                    grace: '10%' // Adds padding at the top and bottom of the scale
                },
                x: { 
                    grid: { color: 'rgba(255,255,255,0.08)' },
                    ticks: { color: '#cbd5e1', font: { family: 'JetBrains Mono', size: 10 } }
                }
            },
            plugins: { legend: { display: false } },
            animation: {
                duration: 800,
                easing: 'easeInOutQuart'
            }
        }
    });

    if (typeof Module === 'function') {
        Module().then(instance => {
            mcModule = instance;
            updateSimulation();
        });
    }

    const slider = document.getElementById('volSlider');
    slider.oninput = function() {
        document.getElementById('volValue').innerText = this.value + "%";
        updateSimulation();
    };

    function updateSimulation() {
        if (!mcModule) return;
        const vol = slider.value / 100.0;
        const numPaths = 12; 
        chart.data.datasets = []; 

        const colors = [
            'rgba(99, 102, 241, 0.4)', // Indigo
            'rgba(168, 85, 247, 0.4)', // Purple
            'rgba(236, 72, 153, 0.4)', // Pink
            'rgba(45, 212, 191, 0.4)'  // Teal
        ];

        for (let p = 0; p < numPaths; p++) {
            // Incorporate volatility into the seed so the Brownian motion (shape) 
            // changes as you slide, instead of just scaling the same path.
            const seed = 42 + p + Math.floor(vol * 10000); 
            const rawPath = mcModule.get_sample_path(100.0, 0.05, vol, 1.0, 252, seed);
            const jsPath = [];
            for (let i = 0; i < rawPath.size(); i++) jsPath.push(rawPath.get(i));

            chart.data.datasets.push({
                data: jsPath,
                borderColor: colors[p % colors.length],
                borderWidth: 2, // Uniform width for all paths
                fill: false
            });
        }
        chart.update(); // Apply smooth transition animation

        // Update Greeks Calculation
        try {
            const greeks = mcModule.get_greeks("european", 100.0, 100.0, 0.05, vol, 1.0, 252, 1000, 42);
            document.getElementById('delta-value').innerText = greeks.delta.toFixed(4);
            document.getElementById('gamma-value').innerText = greeks.gamma.toFixed(4);
            document.getElementById('vega-value').innerText = greeks.vega.toFixed(2);
            document.getElementById('theta-value').innerText = greeks.theta.toFixed(2);
            document.getElementById('rho-value').innerText = greeks.rho.toFixed(2);
        } catch (err) {
            console.error("Greeks computation failed:", err);
        }
    }
</script>
