<div class="mc-widget" style="background: #f9f9f9; padding: 25px; border-radius: 12px; border: 1px solid #eee; margin: 30px 0;">
    <h3 style="margin-top: 0;">Quant Portfolio: Real-Time GBM Diffusion</h3>
    
    <div style="margin-bottom: 20px;">
        <label style="font-weight: bold; display: block; margin-bottom: 10px;">
            Asset Volatility (σ): <span id="volValue" style="color: #007bff;">20%</span>
        </label>
        <input type="range" id="volSlider" min="5" max="80" value="20" step="1" style="width: 100%; cursor: pointer;">
        <p style="font-size: 0.85em; color: #666; margin-top: 5px;">
            Dragging this slider changes the <strong>Temperature</strong> of the simulation in real-time.
        </p>
    </div>

    <div style="position: relative; height: 350px; width: 100%;">
        <canvas id="mcChart"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="/js/mc_engine.js"></script>

<script>
    let mcModule;
    let chart;

    // 1. Initialize the Chart
    const ctx = document.getElementById('mcChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array.from({length: 253}, (_, i) => i), datasets: [] },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            elements: { point: { radius: 0 } },
            scales: {
                y: { min: 40, max: 200, title: { display: true, text: 'Asset Price ($)' } },
                x: { title: { display: true, text: 'Trading Days' } }
            },
            plugins: { legend: { display: false } },
            animation: { duration: 150 }
        }
    });

    // 2. Load the C++ Wasm Module
    if (typeof Module !== 'undefined') {
        Module().then(instance => {
            mcModule = instance;
            updateSimulation(); // Run initial simulation
        });
    }

    // 3. Handle Slider Input
    const slider = document.getElementById('volSlider');
    slider.oninput = function() {
        document.getElementById('volValue').innerText = this.value + "%";
        updateSimulation();
    };

    // 4. The Bridge: Call C++ from JavaScript
    function updateSimulation() {
        if (!mcModule) return;
        
        const vol = slider.value / 100.0;
        const numPaths = 10; 
        
        chart.data.datasets = []; 

        for (let p = 0; p < numPaths; p++) {
            // Call the C++ function exported via Emscripten
            const rawPath = mcModule.get_sample_path(100.0, 0.05, vol, 1.0, 252, 42 + p);
            
            const jsPath = [];
            for (let i = 0; i < rawPath.size(); i++) {
                jsPath.push(rawPath.get(i));
            }

            chart.data.datasets.push({
                label: `Path ${p}`,
                data: jsPath,
                borderColor: 'rgba(0, 123, 255, 0.25)',
                borderWidth: 1.5,
                fill: false
            });
        }
        chart.update();
    }
</script>
