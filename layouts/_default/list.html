{{ define "main" }}
    <section>
        <h1>{{ .Title }}</h1>
        <div class="description">
            {{ .Content }}
        </div>

        <ul class="project-list">
            {{ range .Pages }}
            <li class="project-item">
                <a href="{{ .RelPermalink }}">
                    <h3>{{ .Title }}</h3>
                    <p>{{ .Params.description }}</p>
                </a>
            </li>
            {{ end }}
        </ul>
    </section>
{{ end }}
